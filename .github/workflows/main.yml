name: LMS CI/CD Pipeline

on:
  push:
    branches: [ main ] # Chạy mỗi khi bạn push code vào nhánh main
  pull_request:
    branches: [ main ] # Chạy khi có PR vào main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x' # Project của bạn dùng .NET 9

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./TestResults/**/*.xml
        flags: unittests
        name: codecov-umbrella

    - name: Deploy to Render
      if: github.ref == 'refs/heads/main' && success() # Chỉ chạy khi push lên main và các bước trên thành công
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
