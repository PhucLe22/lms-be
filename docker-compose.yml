services:
  db:
    image: postgres:16
    container_name: lms-pg
    env_file: .env
    environment:
      POSTGRES_DB: LmsDb
    ports:
      - "5432:5432"
    volumes:
      - lms-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  lms-data:
  redis-data:
